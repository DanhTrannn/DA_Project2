name: adventureworks_analytics
version: "1.0.0"
config-version: 2

profile: adventureworks_analytics

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]
clean-targets: ["target", "dbt_packages"]

models:
  adventureworks_analytics:
    staging:
      +schema: staging
      +materialized: view
    core:
      +schema: core_dw
      +materialized: table
    marts:
      +enabled: false
      sales:
        +enabled: true
        +schema: mart_sales
        +materialized: table
      finance:
        +enabled: true
        +schema: mart_finance
        +materialized: table
      customer:
        +enabled: true
        +schema: mart_customer
        +materialized: table
      product:
        +enabled: true
        +schema: mart_product
        +materialized: table
      forecast:
        +enabled: true
        +schema: mart_sales_forecast
        +materialized: table
      macro:
        +enabled: true
        +schema: mart_macro
        +materialized: table
    features:
      +schema: analytics
      +materialized: table
      +enabled: true
    audit:
      +schema: audit
      +materialized: table

seeds:
  adventureworks_analytics:
    +schema: raw_macro
    macro_observations:
      +column_types:
        country_code: varchar(2)
        country_name: varchar(64)
        year: integer
        indicator_code: varchar(32)
        indicator_name: varchar(128)
        value: numeric(18,6)
        unit: varchar(64)
        source_name: varchar(64)
        source_url: text
        retrieved_at: date
