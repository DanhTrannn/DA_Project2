adventureworks_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('SOURCE_HOST', 'db') }}"
      port: "{{ env_var('SOURCE_INTERNAL_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('SOURCE_DATABASE', 'Adventureworks') }}"
      schema: analytics_work
      threads: 4
